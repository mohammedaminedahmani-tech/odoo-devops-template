name: 🧪 E2E Tests — Claude + MCP Playwright

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module à tester (ex: dc_caisse_transfer)'
        required: false
        type: string
      group:
        description: 'Groupe à tester (ex: paiement_client)'
        required: false
        type: string
      all:
        description: 'Tester tous les modules'
        required: false
        type: boolean
        default: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies
        run: pip install requests

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🤖 Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: 🎭 Add MCP Playwright to Claude
        run: claude mcp add playwright npx @playwright/mcp@latest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: 🧪 Run E2E Tests
        run: |
          if [ "${{ inputs.all }}" = "true" ]; then
            python e2e.py --all
          elif [ -n "${{ inputs.group }}" ]; then
            python e2e.py --group=${{ inputs.group }}
          elif [ -n "${{ inputs.module }}" ]; then
            python e2e.py --module=${{ inputs.module }}
          else
            echo "❌ Aucun module, groupe ou --all spécifié"
            exit 1
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}